name: Python Test
on:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: pip install uv
      - run: uv pip install inflect pytest pytest-asyncio textual-dev
      - run: pytest
